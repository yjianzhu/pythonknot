name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-14]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
      RUST_KNOT_REPO: ${{ vars.RUST_KNOT_REPO }}
      RUST_KNOT_REF: ${{ vars.RUST_KNOT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Ensure rust_knot source is available
        shell: bash
        run: |
          if [[ -f vendor/rust_knot/Cargo.toml ]]; then
            echo "Using existing vendor/rust_knot in repository checkout."
            exit 0
          fi

          if [[ -z "${RUST_KNOT_REPO}" ]]; then
            echo "ERROR: vendor/rust_knot missing and RUST_KNOT_REPO is not configured."
            echo "Set repository variable RUST_KNOT_REPO to a cloneable git URL."
            exit 1
          fi

          REF="${RUST_KNOT_REF:-master}"
          mkdir -p vendor
          git clone --depth 1 --branch "${REF}" "${RUST_KNOT_REPO}" vendor/rust_knot
          test -f vendor/rust_knot/Cargo.toml

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel

      - name: Build wheel
        shell: bash
        run: |
          python setup.py bdist_wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    env:
      RUST_KNOT_REPO: ${{ vars.RUST_KNOT_REPO }}
      RUST_KNOT_REF: ${{ vars.RUST_KNOT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Ensure rust_knot source is available
        shell: bash
        run: |
          if [[ -f vendor/rust_knot/Cargo.toml ]]; then
            exit 0
          fi
          if [[ -z "${RUST_KNOT_REPO}" ]]; then
            echo "ERROR: vendor/rust_knot missing and RUST_KNOT_REPO is not configured."
            exit 1
          fi
          REF="${RUST_KNOT_REF:-master}"
          mkdir -p vendor
          git clone --depth 1 --branch "${REF}" "${RUST_KNOT_REPO}" vendor/rust_knot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        shell: bash
        run: |
          python -m pip install -U pip build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/pythonknot
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Show artifacts
        shell: bash
        run: |
          ls -lh dist

      - name: Validate PyPI token
        shell: bash
        run: |
          if [[ -z "${{ secrets.PYPI_API_TOKEN }}" ]]; then
            echo "ERROR: secrets.PYPI_API_TOKEN is empty or missing."
            exit 1
          fi

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
